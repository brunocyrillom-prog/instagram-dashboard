<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Instagram · Sonho dá Sorte</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; }
  .topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .ig-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .brand-name { font-size: 16px; font-weight: 600; }
  .brand-sub { font-size: 12px; color: #888; margin-top: 1px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #EF9F27; }
  .dot.live { background: #639922; }
  .dot.error { background: #E24B4A; }
  .btn { padding: 8px 18px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; font-size: 13px; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #f5f5f0; }
  .btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn-primary:hover { background: #333; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  .error-bar { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #A32D2D; margin-bottom: 20px; display: none; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: #fff; border-radius: 10px; border: 0.5px solid rgba(0,0,0,0.08); padding: 16px 18px; }
  .kpi-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .kpi-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media(max-width:640px) { .grid2 { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.08); padding: 20px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 16px; color: #333; }
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .media-card { background: #fff; border-radius: 10px; border: 0.5px solid rgba(0,0,0,0.08); overflow: hidden; }
  .thumb { width: 100%; aspect-ratio: 1; background: #f5f5f0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .media-info { padding: 10px 12px; }
  .media-type { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
  .type-IMAGE { background: #E6F1FB; color: #185FA5; }
  .type-REEL { background: #EEEDFE; color: #534AB7; }
  .type-CAROUSEL_ALBUM { background: #E1F5EE; color: #0F6E56; }
  .type-VIDEO { background: #FAEEDA; color: #854F0B; }
  .media-caption { font-size: 11px; color: #666; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .media-stats { display: flex; gap: 10px; font-size: 11px; color: #aaa; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; font-size: 12px; color: #888; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  footer { text-align: center; font-size: 12px; color: #bbb; padding: 24px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="ig-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="white" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="white"/></svg></div>
    <div><div class="brand-name">Sonho dá Sorte</div><div class="brand-sub">Dashboard Instagram</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="status"><div class="dot" id="dot"></div><span id="statusTxt">Carregando...</span></div>
    <button class="btn" onclick="loadAll()">Atualizar</button>
    <button class="btn btn-primary" onclick="window.print()">Exportar PDF</button>
  </div>
</div>
<div class="container">
  <div class="error-bar" id="errorBar"></div>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="grid2">
    <div class="card"><div class="card-title">Curtidas por publicação</div><div class="legend"><span><span class="legend-dot" style="background:#378ADD"></span>Curtidas</span><span><span class="legend-dot" style="background:#1D9E75"></span>Comentários</span></div><div style="position:relative;height:200px;"><canvas id="chartLikes"></canvas></div></div>
    <div class="card"><div class="card-title">Tipo de conteúdo</div><div style="position:relative;height:200px;"><canvas id="chartTypes"></canvas></div></div>
  </div>
  <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:12px;">Últimas publicações</div>
  <div class="media-grid" id="mediaGrid"><div style="grid-column:1/-1;text-align:center;padding:32px;color:#aaa;font-size:13px;">Carregando...</div></div>
</div>
<footer>Dashboard · Sonho dá Sorte · Atualizado em <span id="lastUpdate">—</span></footer>
<script>
function fmt(n){if(n===undefined||n===null)return'—';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'k';return Math.round(n).toLocaleString('pt-BR');}
function setStatus(type,txt){document.getElementById('dot').className='dot '+type;document.getElementById('statusTxt').textContent=txt;}
function showError(msg){const b=document.getElementById('errorBar');b.textContent=msg;b.style.display='block';setStatus('error','Erro');}
async function apiFetch(e){const r=await fetch('/api/instagram?endpoint='+e);return r.json();}
let cL,cT;
async function loadAll(){
  setStatus('','Carregando...');document.getElementById('errorBar').style.display='none';
  try{
    const[profile,media]=await Promise.all([apiFetch('profile'),apiFetch('media')]);
    if(profile.error){showError('Erro: '+profile.error.message);return;}
    document.getElementById('kpiGrid').innerHTML=`<div class="kpi"><div class="kpi-label">Seguidores</div><div class="kpi-value">${fmt(profile.followers_count)}</div></div><div class="kpi"><div class="kpi-label">Seguindo</div><div class="kpi-value">${fmt(profile.follows_count)}</div></div><div class="kpi"><div class="kpi-label">Publicações</div><div class="kpi-value">${fmt(profile.media_count)}</div></div><div class="kpi"><div class="kpi-label">Username</div><div class="kpi-value" style="font-size:16px">@${profile.username||profile.name}</div></div>${profile.biography?`<div class="kpi" style="grid-column:1/-1"><div class="kpi-label">Bio</div><div style="font-size:13px;color:#555;margin-top:4px">${profile.biography}</div></div>`:''}`;
    if(!media.error&&media.data){
      const posts=media.data;
      document.getElementById('mediaGrid').innerHTML=posts.map(p=>{const tl={IMAGE:'Foto',REEL:'Reel',CAROUSEL_ALBUM:'Carrossel',VIDEO:'Vídeo'}[p.media_type]||p.media_type;const th=p.thumbnail_url||p.media_url||'';const cap=p.caption?p.caption.substring(0,80)+(p.caption.length>80?'...':''):'Sem legenda';const dt=p.timestamp?new Date(p.timestamp).toLocaleDateString('pt-BR'):'';return`<div class="media-card"><div class="thumb">${th?`<img src="${th}" alt="post" loading="lazy"/>`:'<div style="color:#ccc;font-size:24px">📷</div>'}</div><div class="media-info"><span class="media-type type-${p.media_type}">${tl}</span><div class="media-caption">${cap}</div><div class="media-stats"><span>♥ ${fmt(p.like_count||0)}</span><span>💬 ${fmt(p.comments_count||0)}</span><span>${dt}</span></div></div></div>`;}).join('');
      if(cL)cL.destroy();cL=new Chart(document.getElementById('chartLikes'),{type:'bar',data:{labels:posts.map((_,i)=>'P'+(i+1)),datasets:[{label:'Curtidas',data:posts.map(p=>p.like_count||0),backgroundColor:'rgba(55,138,221,0.75)',borderRadius:4},{label:'Comentários',data:posts.map(p=>p.comments_count||0),backgroundColor:'rgba(29,158,117,0.75)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11}}}}}});
      const tc={};posts.forEach(p=>{tc[p.media_type]=(tc[p.media_type]||0)+1;});if(cT)cT.destroy();cT=new Chart(document.getElementById('chartTypes'),{type:'doughnut',data:{labels:Object.keys(tc).map(k=>({IMAGE:'Foto',REEL:'Reel',CAROUSEL_ALBUM:'Carrossel',VIDEO:'Vídeo'}[k]||k)),datasets:[{data:Object.values(tc),backgroundColor:Object.keys(tc).map(k=>({IMAGE:'#378ADD',REEL:'#7F77DD',CAROUSEL_ALBUM:'#1D9E75',VIDEO:'#EF9F27'}[k]||'#aaa')),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:12}}}}});
    }
    document.getElementById('lastUpdate').textContent=new Date().toLocaleString('pt-BR');
    setStatus('live','Dados atualizados · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){showError('Erro: '+e.message);}
}
loadAll();
</script>
</body>
</html>
